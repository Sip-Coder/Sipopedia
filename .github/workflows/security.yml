name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Secret Guard
        run: npm run security:secrets

      - name: Dependency Audit
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build
