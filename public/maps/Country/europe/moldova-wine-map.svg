    <path class="land-line" d="M371.38,336.52L415.21,308.70L539.96,291.00L678.20,349.16L755.75,355.90L840.04,406.48L826.55,469.69L893.98,500.88L920.95,578.43L986.70,626.47L974.06,654.29L1008.62,673.68L958.89,687.16L848.47,681.26L829.92,655.98L791.15,671.15L804.63,704.02L753.22,763.87L720.34,827.93L673.14,849.00L639.43,763.02L659.66,682.95L653.76,601.19L545.86,489.08L486.02,410.69L427.86,355.06L371.38,336.52Z"/>
    <path class="land-core" d="M371.38,336.52L415.21,308.70L539.96,291.00L678.20,349.16L755.75,355.90L840.04,406.48L826.55,469.69L893.98,500.88L920.95,578.43L986.70,626.47L974.06,654.29L1008.62,673.68L958.89,687.16L848.47,681.26L829.92,655.98L791.15,671.15L804.63,704.02L753.22,763.87L720.34,827.93L673.14,849.00L639.43,763.02L659.66,682.95L653.76,601.19L545.86,489.08L486.02,410.69L427.86,355.06L371.38,336.52Z" fill-rule="evenodd"/>
  </g>
  <rect x="1370" y="305" width="610" height="132" rx="24" class="badge"/>
  <text x="1410" y="358" class="badge-text">Moldova / atlas outline</text>
  <text x="1410" y="398" class="footer">Primary atlas outline fitted for country-scale study.</text>
  <rect x="88" y="940" width="1924" height="382" rx="30" class="region-panel"/>
