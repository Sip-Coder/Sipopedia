<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1400" viewBox="0 0 2100 1400" role="img" aria-label="Serbia Wine Map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
