    <radialGradient id="glowCyan" cx="60%" cy="45%" r="70%">
      <stop offset="0" stop-color="#48e5dc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#48e5dc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
