      .region-row circle { fill: rgba(237, 212, 168, 0.95); }
      .region-number { fill: #04131f; font: 900 18px 'Trebuchet MS', Arial, sans-serif; }
      .region-name { fill: #fff0ce; font: 900 31px 'Trebuchet MS', Arial, sans-serif; }
