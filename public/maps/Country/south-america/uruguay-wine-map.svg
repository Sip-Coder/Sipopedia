    <path class="land-line" d="M482.31,303.45L556.98,291.00L672.63,380.20L715.15,376.57L833.91,450.72L924.14,514.51L990.52,592.82L940.22,647.27L971.85,712.61L922.07,785.21L791.90,849.00L706.85,826.18L644.11,838.63L538.31,788.84L459.49,792.99L389.48,729.21L398.29,654.53L423.71,628.60L422.15,513.99L453.26,395.75L482.31,303.45Z"/>
    <path class="land-core" d="M482.31,303.45L556.98,291.00L672.63,380.20L715.15,376.57L833.91,450.72L924.14,514.51L990.52,592.82L940.22,647.27L971.85,712.61L922.07,785.21L791.90,849.00L706.85,826.18L644.11,838.63L538.31,788.84L459.49,792.99L389.48,729.21L398.29,654.53L423.71,628.60L422.15,513.99L453.26,395.75L482.31,303.45Z" fill-rule="evenodd"/>
