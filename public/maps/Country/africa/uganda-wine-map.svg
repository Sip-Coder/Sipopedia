    <path class="land-core" d="M846.25,800.52L646.59,808.01L539.48,807.13L505.10,818.59L446.48,849.00L422.68,838.86L423.56,764.82L446.48,727.79L451.77,648.90L472.49,603.50L509.95,552.37L547.41,526.36L579.15,491.55L539.92,478.32L545.65,363.73L586.20,337.28L647.91,358.88L727.24,335.96L796.00,336.40L855.95,291.00L902.67,359.32L914.13,408.24L957.32,520.64L921.62,592.04L873.58,657.27L845.37,696.50L846.25,800.52Z" fill-rule="evenodd"/>
