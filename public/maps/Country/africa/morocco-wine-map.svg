<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1400" viewBox="0 0 2100 1400" role="img" aria-label="Morocco Wine Map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04131f"/>
      <stop offset="0.48" stop-color="#082d33"/>
      <stop offset="1" stop-color="#171f25"/>
